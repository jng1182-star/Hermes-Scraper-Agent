[build]
builder = "nixpacks"
buildCommand = "/opt/venv/bin/pip install -r requirements.txt && /opt/venv/bin/playwright install chromium --with-deps"

[deploy]
startCommand = "/opt/venv/bin/uvicorn api:app --host 0.0.0.0 --port ${PORT:-8000}"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
